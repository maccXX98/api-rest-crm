services:
  postgres:
    image: postgres:latest
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: lienmaster1234
      POSTGRES_DB: bd_titulacion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - crm_network

  adminer:
    image: adminer:latest
    container_name: crm_adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - crm_network

  redis:
    image: redis:latest
    container_name: crm_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - crm_network

networks:
  crm_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
